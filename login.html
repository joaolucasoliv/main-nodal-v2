<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="description" content="Sign in or create a NODAL community account." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cline x1='20' y1='22' x2='44' y2='42' stroke='%2359bc53' stroke-width='5'/%3E%3Ccircle cx='20' cy='22' r='11' fill='%233d5c38'/%3E%3Ccircle cx='44' cy='42' r='8' fill='%2359bc53'/%3E%3C/svg%3E" />
  <title>NODAL · Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=18" />
</head>
<body class="auth-page">
  <header class="navbar" id="top">
    <a class="brand" href="index.html">
      <img class="brand-wordmark" src="assets/nodal-wordmark.png"
           alt="NODAL · Nodos Urbanos de América Latina" />
    </a>
    <nav class="nav-main">
      <a href="index.html#membership">Programs</a>
      <a href="index.html#knowledge">Community</a>
      <a href="index.html#resources">Resources</a>
    </nav>
    <nav class="nav-account">
      <a href="https://sistemaurbano.org/nodal/" target="_blank" rel="noopener noreferrer">Sistema Urbano ↗</a>
    </nav>
    <button type="button" class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <main class="auth-shell">
    <section class="auth-intro">
      <p class="eyebrow">Community access</p>
      <h1>Welcome to NODAL.</h1>
      <p>Create your profile, join NODAL and start meeting people who care about more just, sustainable and human cities.</p>
    </section>

    <section class="auth-grid" aria-label="Authentication forms">
      <form class="auth-card" id="loginForm" novalidate>
        <h2>Sign in</h2>
        <label>Email
          <input type="email" id="loginEmail" autocomplete="email" required />
        </label>
        <label>Password
          <input type="password" id="loginPassword" autocomplete="current-password" minlength="8" required />
        </label>
        <p class="auth-error" id="loginError" hidden></p>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>

      <form class="auth-card" id="signupForm" novalidate>
        <h2>Create account</h2>
        <label>Full name
          <input type="text" id="signupName" autocomplete="name" maxlength="80" required />
        </label>
        <label>Email
          <input type="email" id="signupEmail" autocomplete="email" required />
        </label>
        <label>Password
          <input type="password" id="signupPassword" autocomplete="new-password" minlength="8" required />
        </label>
        <p class="auth-hint">Use at least 8 characters. Your password is protected before storage.</p>
        <p class="auth-error" id="signupError" hidden></p>
        <button type="submit" class="btn btn-primary">Create account</button>
      </form>
    </section>
  </main>

  <script src="nav.js?v=14"></script>
  <script src="auth.js?v=1"></script>
</body>
</html>
